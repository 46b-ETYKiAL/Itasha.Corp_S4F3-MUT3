<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 548" width="1280" height="548">
  <defs>
    <style>
      @keyframes pulse-arc {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
      @keyframes blink-cursor {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes led-glow {
        0%, 100% { filter: drop-shadow(0 0 2px #01fe36); }
        50% { filter: drop-shadow(0 0 6px #01fe36); }
      }
      @keyframes mute-fade {
        0% { opacity: 0.85; }
        50% { opacity: 0.35; }
        100% { opacity: 0.85; }
      }
      @keyframes wave-cancel {
        0% { opacity: 0.7; }
        50% { opacity: 0.05; }
        100% { opacity: 0.7; }
      }
      @keyframes flicker {
        0%,96%,100% { opacity:1; }
        97% { opacity:0.97; }
      }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.9; } }
    @keyframes heartbeat { 0%,100% { r: 3; opacity: 0.5; } 15% { r: 4; opacity: 0.9; } 30% { r: 3; opacity: 0.5; } 45% { r: 3.5; opacity: 0.8; } 60% { r: 3; opacity: 0.5; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3500; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.015; } }

      @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="transparent"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer bezel -->
  <rect x="0" y="0" width="1280" height="548" rx="18" ry="18" fill="#111118" stroke="#2a2833" stroke-width="2"/>
  <!-- Inner bezel -->
  <rect x="12" y="12" width="1256" height="524" rx="12" ry="12" fill="#18181f"/>
  <!-- Screen -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="#08060d"/>
  <!-- Scanlines -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="url(#scanlines)"/>
  <!-- Vignette -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="url(#vignette)"/>


  <!-- Edge glow -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="none" stroke="#ff8c00" stroke-width="1" opacity="0.06" stroke-dasharray="20,3480" style="animation: edgeGlow 12s linear infinite;"/>
  <!-- Scanline sweep -->
  <rect x="24" y="24" width="1232" height="1" fill="#ff8c00" opacity="0.03" rx="0">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,500" dur="10s" repeatCount="indefinite"/>
  </rect>


  <!-- Phosphor bloom -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="white" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  <!-- Corner brackets -->
  <path d="M 40,40 L 40,70 M 40,40 L 70,40" stroke="#ff8c00" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1240,40 L 1240,70 M 1240,40 L 1210,40" stroke="#ff8c00" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 40,510 L 40,480 M 40,510 L 70,510" stroke="#ff8c00" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1240,510 L 1240,480 M 1240,510 L 1210,510" stroke="#ff8c00" stroke-width="1.5" fill="none" opacity="0.1"/>

  <!-- Ambient accent lines -->
  <line x1="24" y1="200" x2="1256" y2="200" stroke="#ff8c00" stroke-width="0.5" opacity="0.03"/>
  <line x1="24" y1="350" x2="1256" y2="350" stroke="#ff8c00" stroke-width="0.5" opacity="0.04"/>

  <!-- Content group with flicker -->
  <g style="animation: flicker 6s infinite;">
  <!-- Header text -->
  <text x="640" y="80" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="11" fill="#5a5869" letter-spacing="6" filter="url(#phosphor)">I T A S H A . C O R P</text>

  <!-- Repo name -->
  <text x="640" y="130" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="22" fill="#ff8c00" font-weight="bold" letter-spacing="4" filter="url(#phosphor)">[ S 4 F 3 : M U T 3 ]</text>

  <!-- Boot sequence -->
  <g font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="12" filter="url(#phosphor)">
    <text x="80" y="190" fill="#ff8c00" opacity="0.7">mut3.init ────────────────────────</text>
    <text x="80" y="220" fill="#8a8698" style="animation: bootReveal 0.3s ease-out 0.2s both;">&gt; tailscaled.env.write(NO_LOGS=true)</text>
    <text x="540" y="220" fill="#01fe36">[ OK ]</text>
    <text x="80" y="248" fill="#8a8698" style="animation: bootReveal 0.3s ease-out 0.5s both;">&gt; hosts.append(0.0.0.0 log.tailscale.io)</text>
    <text x="540" y="248" fill="#01fe36">[ OK ]</text>
    <text x="80" y="276" fill="#8a8698" style="animation: bootReveal 0.3s ease-out 0.8s both;">&gt; firewall.allow(adguard:53,3000)</text>
    <text x="540" y="276" fill="#01fe36">[ OK ]</text>
    <text x="80" y="304" fill="#8a8698" style="animation: bootReveal 0.3s ease-out 1.1s both;">&gt; adguard.filter.insert(||log.tailscale.io^)</text>
    <text x="540" y="304" fill="#01fe36">[ OK ]</text>
    <text x="80" y="332" fill="#8a8698" style="animation: bootReveal 0.3s ease-out 1.4s both;">&gt; service.depend(adguard &lt;- tailscale)</text>
    <text x="540" y="332" fill="#01fe36">[ OK ]</text>
    <text x="80" y="360" fill="#ff8c00" opacity="0.7">───────────────────────────────────</text>
    <text x="80" y="400" fill="#8a8698">telemetry</text>
    <text x="185" y="400" fill="#5a5869">........................</text>
    <text x="430" y="400" fill="#ff8c00" font-weight="bold">[ M U T 3 D ]</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="80" y="412" width="8" height="14" fill="#ff8c00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Muted speaker with cancelled waves -->
  <g transform="translate(900, 245)">
    <!-- Speaker body (rectangle) -->
    <rect x="0" y="14" width="14" height="30" fill="none" stroke="#ff8c00" stroke-width="2" opacity="0.85"/>
    <!-- Speaker cone (triangle) -->
    <path d="M 14,14 L 38,-2 L 38,60 L 14,44 Z" fill="none" stroke="#ff8c00" stroke-width="2" opacity="0.85"/>
    <!-- Inner cone glow -->
    <path d="M 14,14 L 38,-2 L 38,60 L 14,44 Z" fill="#ff8c00" opacity="0.06" filter="url(#glow-amber)"/>

    <!-- Sound waves (cancelled - fading) -->
    <path d="M 50 12 Q 64 28 50 46" fill="none" stroke="#ff8c00" stroke-width="2" opacity="0.7" style="animation: wave-cancel 3s ease-in-out infinite;"/>
    <path d="M 60 4 Q 80 28 60 54" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.5" style="animation: wave-cancel 3s ease-in-out 0.4s infinite;"/>
    <path d="M 70 -4 Q 96 28 70 62" fill="none" stroke="#ff8c00" stroke-width="1.2" opacity="0.3" style="animation: wave-cancel 3s ease-in-out 0.8s infinite;"/>

    <!-- Mute slash (the kill line) -->
    <line x1="-6" y1="64" x2="100" y2="-8" stroke="#ff3030" stroke-width="3" opacity="0.85" style="animation: mute-fade 4s ease-in-out infinite;"/>
    <line x1="-6" y1="64" x2="100" y2="-8" stroke="#ff8c00" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Additional decorative elements -->
  <g transform="translate(880, 355)" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="9" fill="#ff8c00" opacity="0.3" filter="url(#phosphor)">
    <text x="0" y="0">TS_NO_LOGS_NO_SUPPORT</text>
    <text x="0" y="14">HOSTS  0.0.0.0</text>
    <text x="0" y="28">ADGUARD  ||log.tailscale.io^</text>
    <text x="0" y="42">DEPEND  ADGUARD &lt;- TAILSCALE</text>
  </g>

  <!-- Horizontal accent line -->
  <line x1="80" y1="450" x2="580" y2="450" stroke="#ff8c00" stroke-width="1" opacity="0.15"/>
  <line x1="880" y1="450" x2="1200" y2="450" stroke="#ff8c00" stroke-width="1" opacity="0.15"/>

  <!-- Status line -->
  <text x="80" y="480" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="10" fill="#5a5869" opacity="0.4" filter="url(#phosphor)">SYS.MUT3 :: TELEMETRY MUTED :: WIRE QUIET</text>
  </g>

  <!-- Status dots -->
  <circle cx="50" cy="505" r="3" fill="#01fe36" opacity="0.7" style="animation: heartbeat 2s ease-in-out infinite;"/>
  <circle cx="62" cy="505" r="3" fill="#ff8c00" opacity="0.5"/>
  <circle cx="74" cy="505" r="3" fill="#5a5869" opacity="0.4"/>

  <!-- Top bezel line -->
  <line x1="30" y1="14" x2="1250" y2="14" stroke="#2a2833" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottom bezel line -->
  <line x1="30" y1="536" x2="1250" y2="536" stroke="#2a2833" stroke-width="0.5" opacity="0.3"/>

  <!-- Power LED -->
  <circle cx="1232" cy="534" r="6" fill="#01fe36" opacity="0.3"/>
  <circle cx="1232" cy="534" r="4" fill="#01fe36" opacity="1.0"/>

  <!-- Bezel labels -->
  <text x="40" y="542" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="9" fill="#4a4859" letter-spacing="2">ITASHA.CORP</text>
  <text x="1200" y="542" text-anchor="end" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="9" fill="#4a4859">CRT-S4F3</text>
</svg>
